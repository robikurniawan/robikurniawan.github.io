<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Web Developer, Co-Founder & CTO Kopitani">
    <meta name="author" content="Robi Kurniawan">

    <title>Robi Kurniawan — Web Developer</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #16161f;
            --bg-card-hover: #1c1c28;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --accent-secondary: #22d3ee;
            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
            --text-muted: #71717a;
            --border: rgba(255, 255, 255, 0.06);
            --gradient: linear-gradient(135deg, #6366f1 0%, #22d3ee 100%);
            --nav-link: #89a4e0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Navigation */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 1.25rem 2rem;
            background: transparent;
            transition: all 0.3s ease;
        }

        .nav.scrolled {
            background: rgba(10, 10, 15, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-brand {
            font-weight: 500;
            font-size: 1rem;
            color: var(--text-primary);
            text-decoration: none;
            font-family: 'Fira Code', monospace;
        }

        .nav-brand:hover {
            color: var(--nav-link);
        }

        .nav-toggle {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            z-index: 1002;
            position: relative;
        }

        .nav-toggle-inner {
            display: flex;
            flex-direction: column;
            gap: 7px;
            align-items: flex-end;
        }

        .nav-toggle-inner .line {
            display: block;
            height: 2px;
            background: var(--text-primary);
            transition: all 0.3s ease;
        }

        .nav-toggle-inner .line-1 {
            width: 24px;
        }

        .nav-toggle-inner .line-2 {
            width: 16px;
        }

        .nav-toggle.active .nav-toggle-inner .line-1 {
            width: 20px;
            transform: translateY(4.5px) rotate(45deg);
        }

        .nav-toggle.active .nav-toggle-inner .line-2 {
            width: 20px;
            transform: translateY(-4.5px) rotate(-45deg);
        }

        .nav-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 11, 20, 0.95);
            z-index: 1001;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .nav-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .nav-links {
            list-style: none;
            text-align: center;
        }

        .nav-links li {
            margin: 1.25rem 0;
        }

        .nav-links a {
            font-family: 'Fira Code', monospace;
            font-size: clamp(1.5rem, 4vw, 2.25rem);
            font-weight: 400;
            color: #89a4e0;
            text-decoration: none;
            transition: color 0.2s;
            letter-spacing: -0.02em;
        }

        .nav-links a:hover {
            color: var(--text-primary);
        }

        /* Hero */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6rem 2rem 4rem;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 48px 48px;
            mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 20%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 20%, transparent 70%);
            pointer-events: none;
        }

        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 80% 70% at 50% 50%, transparent 40%, rgba(0,0,0,0.6) 100%);
            pointer-events: none;
        }

        .hero-content {
            text-align: center;
            position: relative;
            z-index: 1;
            font-family: 'Fira Code', monospace;
        }

        .hero-prompt {
            font-size: 0.95rem;
            color: var(--accent);
            margin-bottom: 0.5rem;
            text-align: left;
            max-width: 320px;
            margin-left: auto;
            margin-right: auto;
        }

        .hero-prompt .cursor {
            display: inline-block;
            width: 8px;
            height: 1.2em;
            background: var(--accent);
            margin-left: 4px;
            animation: blink 1s step-end infinite;
            vertical-align: text-bottom;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .hero h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        .hero h1 .bracket {
            color: var(--accent);
            font-weight: 400;
        }

        .hero-subtitle {
            font-size: 1rem;
            color: var(--text-secondary);
            max-width: 520px;
            margin: 0 auto 1rem;
            line-height: 1.8;
        }

        .hero-subtitle a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .hero-subtitle a:hover {
            color: var(--accent-secondary);
        }

        .hero-quote {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin: 1.5rem 0 2rem;
            font-style: normal;
        }

        .hero-quote .quote-char {
            color: var(--accent);
            margin-right: 4px;
        }

        .hero-touch {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .hero-social {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .hero-social a {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: var(--bg-card);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            transition: all 0.2s ease;
        }

        .hero-social a:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            justify-content: center;
            align-items: center;
            margin: 1.5rem 0;
        }

        .skill-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            transition: all 0.2s ease;
        }

        .skill-badge:hover {
            border-color: rgba(99, 102, 241, 0.4);
            color: var(--text-primary);
            transform: translateY(-2px);
        }

        .skill-badge img {
            width: 22px;
            height: 22px;
            object-fit: contain;
        }

        /* Sections */
        section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        .section-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 2.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 32px;
            background: var(--gradient);
            border-radius: 2px;
        }

        /* Portfolio Masonry */
        .portfolio-grid {
            column-count: 3;
            column-gap: 1.5rem;
        }

        .portfolio-card {
            break-inside: avoid;
            margin-bottom: 1.5rem;
            background: var(--bg-card);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .portfolio-card:hover {
            background: var(--bg-card-hover);
            border-color: rgba(99, 102, 241, 0.3);
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .portfolio-card-image {
            position: relative;
            display: block;
            overflow: hidden;
        }

        .portfolio-card-image::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            transition: opacity 0.3s ease;
        }

        .portfolio-card:hover .portfolio-card-image::after {
            opacity: 0;
        }

        .portfolio-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .portfolio-card:hover img {
            transform: scale(1.03);
        }

        .portfolio-card-body {
            padding: 1.25rem;
        }

        .portfolio-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }

        .badge {
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 500;
            font-family: 'JetBrains Mono', monospace;
        }

        .badge-primary {
            background: rgba(99, 102, 241, 0.2);
            color: var(--accent);
        }

        .badge-tech {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-secondary);
        }

        .portfolio-card h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .portfolio-card a {
            color: var(--text-primary);
            text-decoration: none;
        }

        .portfolio-card a:hover {
            color: var(--accent);
        }

        .portfolio-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            color: var(--accent);
            margin-top: 8px;
            text-decoration: none;
            transition: gap 0.2s;
        }

        .portfolio-link:hover {
            gap: 10px;
        }

        .blog-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .blog-item {
            padding: 1rem 1.25rem;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }

        .blog-item:hover {
            border-color: rgba(99, 102, 241, 0.3);
        }

        .blog-item a {
            color: var(--text-primary);
            text-decoration: none;
        }

        .blog-item a:hover {
            color: var(--accent);
        }

        .blog-item .blog-date {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-family: 'Fira Code', monospace;
            margin-top: 4px;
        }

        /* Achievement */
        .achievement {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: center;
            margin-bottom: 4rem;
            padding: 2rem 0;
            border-bottom: 1px solid var(--border);
        }

        .achievement:last-of-type {
            border-bottom: none;
        }

        .achievement:nth-child(even) .achievement-content {
            order: 2;
        }

        .achievement:nth-child(even) .achievement-image {
            order: 1;
        }

        .achievement-image {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
        }

        .achievement-image::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            transition: opacity 0.3s ease;
        }

        .achievement:hover .achievement-image::after {
            opacity: 0;
        }

        .achievement-image img {
            width: 100%;
            display: block;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .achievement-content h2 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
        }

        .achievement-content h2 span {
            color: var(--accent);
        }

        .achievement-content h6 {
            color: var(--text-muted);
            font-weight: 400;
            margin-bottom: 1rem;
        }

        .achievement-content p {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            text-align: justify;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            font-family: inherit;
            border: none;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px var(--accent-glow);
        }

        /* Footer */
        footer {
            background: var(--bg-secondary);
            padding: 2rem;
            text-align: center;
            margin-top: 4rem;
            border-top: 1px solid var(--border);
        }

        footer p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        footer .heart {
            color: #ef4444;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* Responsive */
        @media (min-width: 1400px) {
            .portfolio-grid {
                column-count: 4;
            }
        }

        @media (max-width: 1024px) {
            .portfolio-grid {
                column-count: 2;
            }
        }

        @media (max-width: 768px) {
            .portfolio-grid {
                column-count: 1;
            }

            .achievement {
                grid-template-columns: 1fr;
            }

            .achievement:nth-child(even) .achievement-content,
            .achievement:nth-child(even) .achievement-image {
                order: unset;
            }
        }
    </style>
</head>

<body>
    <!-- Navigation -->
    <nav class="nav" id="nav">
        <div class="nav-inner">
            <a href="index.html" class="nav-brand">robikurniawan.github.io</a>
            <button class="nav-toggle" aria-label="Toggle menu" onclick="toggleNav()">
                <span class="nav-toggle-inner">
                    <span class="line line-1"></span>
                    <span class="line line-2"></span>
                </span>
            </button>
        </div>
    </nav>
    <div class="nav-overlay" id="navOverlay">
        <ul class="nav-links">
            <li><a href="index.html" onclick="closeNav()">Home</a></li>
            <li><a href="works.html" onclick="closeNav()">Works</a></li>
            <li><a href="achievements.html" onclick="closeNav()">Achievements</a></li>
            <li><a href="blog/index.html" onclick="closeNav()">Blog</a></li>
        </ul>
    </div>

    <!-- Hero -->
    <header class="hero" id="home">
        <div class="hero-content">
            <p class="hero-prompt">$ whoami<span class="cursor"></span></p>
            <h1><span class="bracket">&lt;</span>Robi Kurniawan<span class="bracket">/&gt;</span></h1>
            <p class="hero-subtitle">
                Full Stack Web App Developer<br>
                Co-Founder <a href="https://kopitani.id" target="_blank">Kopitani.ID</a> 
                <br>  Building things for the web.
            </p>
            <div class="skills">
                <span class="skill-badge"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/laravel/laravel-original.svg" alt="Laravel"></span>
                <span class="skill-badge"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/php/php-original.svg" alt="PHP"></span>
                <span class="skill-badge"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/dotnetcore/dotnetcore-original.svg" alt="ASP.NET Core"></span>
                <span class="skill-badge"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/nestjs/nestjs-original.svg" alt="NestJS"></span>
                <span class="skill-badge"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/nextjs/nextjs-original.svg" alt="Next.js"></span>
                <span class="skill-badge"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/react/react-original.svg" alt="React"></span>
                <span class="skill-badge"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/javascript/javascript-original.svg" alt="JavaScript"></span>
                <span class="skill-badge"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/docker/docker-original.svg" alt="Docker"></span>
                <span class="skill-badge"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/mysql/mysql-original.svg" alt="MySQL"></span>
                <span class="skill-badge"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/git/git-original.svg" alt="Git"></span>
                <span class="skill-badge"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/gitlab/gitlab-original.svg" alt="GitLab"></span>
            </div>
            <p class="hero-quote">
                <span class="quote-char">//</span> Passionate about technology and making the impact on other people.
            </p>
            <div class="hero-social">
                <a href="https://github.com/robikurniawan" target="_blank" aria-label="GitHub"><i class="fab fa-github"></i></a>
                <a href="mailto:robikurniawan.it@gmail.com" aria-label="Email"><i class="fas fa-envelope"></i></a>
            </div>
        </div>
    </header>



    <script>
        function toggleNav() {
            const overlay = document.getElementById('navOverlay');
            const btn = document.querySelector('.nav-toggle');
            overlay.classList.toggle('active');
            btn.classList.toggle('active');
            document.body.style.overflow = overlay.classList.contains('active') ? 'hidden' : '';
        }

        function closeNav() {
            document.getElementById('navOverlay').classList.remove('active');
            document.querySelector('.nav-toggle').classList.remove('active');
            document.body.style.overflow = '';
        }

        window.addEventListener('scroll', () => {
            document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 20);
        });

        fetch('data/works.json')
            .then(r => r.json())
            .then(works => {
                const preview = works.slice(0, 6);
                document.getElementById('worksPreview').innerHTML = preview.map(w => `
                    <div class="portfolio-card">
                        <a href="${w.link || w.image}" ${w.link ? 'target="_blank"' : ''} class="portfolio-card-image">
                            <img src="${w.image}" alt="${w.title}" loading="lazy">
                        </a>
                        <div class="portfolio-card-body">
                            <div class="portfolio-badges">
                                <span class="badge badge-primary">${w.type}</span>
                                ${w.tech.map(t => `<span class="badge badge-tech">${t}</span>`).join('')}
                            </div>
                            <h3>${w.title}</h3>
                            ${w.link ? `<a href="${w.link}" target="_blank" class="portfolio-link"><i class="fas fa-external-link-alt"></i> See Portfolio</a>` : ''}
                        </div>
                    </div>
                `).join('');
            })
            .catch(() => document.getElementById('worksPreview').innerHTML = '<p style="color:var(--text-muted)">Gagal memuat.</p>');

        fetch('data/achievements.json')
            .then(r => r.json())
            .then(items => {
                document.getElementById('achievementsPreview').innerHTML = items.map(a => `
                    <div class="achievement">
                        <div class="achievement-image">
                            <img src="${a.image}" alt="${a.title}" loading="lazy">
                        </div>
                        <div class="achievement-content">
                            <h2><span>${a.title}</span></h2>
                            <h6>${a.subtitle}</h6>
                            <p>${a.description}</p>
                            <a href="${a.link}" target="_blank" class="btn btn-primary"><i class="fas fa-external-link-alt"></i> Read more</a>
                        </div>
                    </div>
                `).join('');
            })
            .catch(() => document.getElementById('achievementsPreview').innerHTML = '<p style="color:var(--text-muted)">Gagal memuat.</p>');

        fetch('blog/list.txt')
            .then(r => r.text())
            .then(txt => {
                const slugs = txt.split('\n').map(s => s.trim()).filter(Boolean).slice(0, 3);
                if (slugs.length === 0) return;
                Promise.all(slugs.map(slug =>
                    fetch('blog/' + slug + '.md').then(r => r.text()).then(md => {
                        const m = md.match(/title:\s*(.+)/);
                        const d = md.match(/date:\s*(.+)/);
                        return { slug, title: m ? m[1].trim() : slug, date: d ? d[1].trim() : '' };
                    }).catch(() => ({ slug, title: slug, date: '' }))
                )).then(posts => {
                    document.getElementById('blogList').innerHTML = posts.map(p => `
                        <div class="blog-item">
                            <a href="blog/post.html?slug=${p.slug}">${p.title}</a>
                            <div class="blog-date">${p.date}</div>
                        </div>
                    `).join('');
                });
            })
            .catch(() => {});
    </script>
</body>

</html>
