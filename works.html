<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Portfolio works - Web applications by Robi Kurniawan">
    <meta name="author" content="Robi Kurniawan">
    <title>Works — Robi Kurniawan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="nav" id="nav">
        <div class="nav-inner">
            <a href="index.html" class="nav-brand">robikurniawan.github.io</a>
            <button class="nav-toggle" aria-label="Toggle menu" onclick="toggleNav()">
                <span class="nav-toggle-inner">
                    <span class="line line-1"></span>
                    <span class="line line-2"></span>
                </span>
            </button>
        </div>
    </nav>
    <div class="nav-overlay" id="navOverlay">
        <ul class="nav-links">
            <li><a href="index.html" onclick="closeNav()">Home</a></li>
            <li><a href="works.html" onclick="closeNav()">Works</a></li>
            <li><a href="achievements.html" onclick="closeNav()">Achievements</a></li>
            <li><a href="publications.html" onclick="closeNav()">Publications</a></li>
            <li><a href="blog/index.html" onclick="closeNav()">Blog</a></li>
        </ul>
    </div>

    <section style="padding-top: 6rem;">
        <h2 class="section-title">Works</h2>
        <div class="portfolio-grid" id="worksGrid"></div>
    </section>

    <footer>
        <p>Copyright &copy; 2015 - <span id="footerYear"></span><br>Dev With <i class="fas fa-heart heart"></i></p>
    </footer>

    <script>
        function toggleNav() {
            const overlay = document.getElementById('navOverlay');
            const btn = document.querySelector('.nav-toggle');
            overlay.classList.toggle('active');
            btn.classList.toggle('active');
            document.body.style.overflow = overlay.classList.contains('active') ? 'hidden' : '';
        }
        function closeNav() {
            document.getElementById('navOverlay').classList.remove('active');
            document.querySelector('.nav-toggle').classList.remove('active');
            document.body.style.overflow = '';
        }
        window.addEventListener('scroll', () => {
            document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 20);
        });

        fetch('data/works.json')
            .then(r => r.json())
            .then(works => {
                document.getElementById('worksGrid').innerHTML = works.map(w => `
                    <div class="portfolio-card">
                        <a href="${w.link || w.image}" ${w.link ? 'target="_blank"' : ''} class="portfolio-card-image">
                            <img src="${w.image}" alt="${w.title}" loading="lazy">
                        </a>
                        <div class="portfolio-card-body">
                            <div class="portfolio-badges">
                                <span class="badge badge-primary">${w.type}</span>
                                ${w.tech.map(t => `<span class="badge badge-tech">${t}</span>`).join('')}
                            </div>
                            <h3>${w.title}</h3>
                            ${w.link ? `<a href="${w.link}" target="_blank" class="portfolio-link"><i class="fas fa-external-link-alt"></i> See Portfolio</a>` : ''}
                        </div>
                    </div>
                `).join('');
            })
            .catch(() => document.getElementById('worksGrid').innerHTML = '<p style="color:var(--text-muted)">Gagal memuat.</p>');
    </script>
    <script>
        (function loadGoatCounter() {
            fetch('data/analytics-config.json')
                .then(function (r) { return r.json(); })
                .then(function (cfg) {
                    var code = cfg.goatcounterCode;
                    if (!code) return;
                    var s = document.createElement('script');
                    s.async = true;
                    s.dataset.goatcounter = 'https://' + code + '.goatcounter.com/count';
                    s.src = '//gc.zgo.at/count.js';
                    document.body.appendChild(s);
                })
                .catch(function () {});
        })();
    </script>
</body>
</html>
